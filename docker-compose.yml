services:
  postgres:
    image: postgres:17
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    volumes:
      - pgdata:/var/lib/postgresql/data
  app-dev:
    profiles: ['dev']
    build:
      context: .
      target: dev
    ports:
      - '3000:3000'
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://user:password@postgres:5432/mydb
    depends_on:
      - postgres
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_output:/app/.output
    command: vp run dev:docker
  app-storybook:
    profiles: ['storybook']
    build:
      context: .
      target: dev
    ports:
      - '6006:6006'
    environment:
      HOST: 0.0.0.0
      PORT: 6006
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_output:/app/.output
    command: vp run storybook:docker
  app-prod:
    profiles: ['prod']
    build:
      context: .
      target: runtime
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://user:password@postgres:5432/mydb
    depends_on:
      - postgres
    command: node .output/server/index.mjs

volumes:
  app_node_modules:
  app_output:
  pgdata:

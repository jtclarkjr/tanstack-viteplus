services:
  app-dev:
    profiles: ['dev']
    build:
      context: .
      target: dev
    ports:
      - '3000:3000'
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_output:/app/.output
    command: vp dev --host 0.0.0.0 --port 3000
  app-storybook:
    profiles: ['storybook']
    build:
      context: .
      target: dev
    ports:
      - '6006:6006'
    environment:
      HOST: 0.0.0.0
      PORT: 6006
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_output:/app/.output
    command: pnpm run storybook:docker
  app-prod:
    profiles: ['prod']
    build:
      context: .
      target: runtime
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    command: bun .output/server/index.mjs

volumes:
  app_node_modules:
  app_output:
